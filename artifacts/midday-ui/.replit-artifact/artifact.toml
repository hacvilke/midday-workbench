kind = "web"
previewPath = "/"
title = "Midday Workbench"
version = "1.0.0"
id = "artifacts/midday-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19657

[services.development]
run = "pnpm --filter @workspace/midday-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/midday-ui", "run", "build" ]
publicDir = "artifacts/midday-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19657"
BASE_PATH = "/"
